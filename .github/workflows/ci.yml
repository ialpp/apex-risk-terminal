name: CI — Apex Risk Terminal

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: 🔍 Lint with flake8
        run: |
          # Stop build on critical errors (E9=syntax, F63=undefined names, F7=syntax)
          flake8 . --count --select=E9,F63,F7,C90 --max-complexity=10 --statistics \
            --exclude=__pycache__,scratch_*.py,.git
          # Warning-only for style
          flake8 . --count --exit-zero --max-line-length=120 --statistics \
            --exclude=__pycache__,scratch_*.py,.git || true

      - name: ✅ Run tests
        run: |
          python -m pytest tests/ -v --tb=short --ignore=tests/stability_suite \
            --cov=modules --cov=core --cov-report=term-missing || true

      - name: 🔁 Verify imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from core.database_handler import DatabaseHandler
              print('✅ DatabaseHandler OK')
          except Exception as e:
              print(f'❌ DatabaseHandler: {e}')
              sys.exit(1)
          try:
              from modules.credit_scoring_engine import AdvancedScoringEngine
              print('✅ AdvancedScoringEngine OK')
          except Exception as e:
              print(f'❌ AdvancedScoringEngine: {e}')
              sys.exit(1)
          try:
              from modules.fraud_detection import FraudDetectionEngine
              print('✅ FraudDetectionEngine OK')
          except Exception as e:
              print(f'❌ FraudDetectionEngine: {e}')
              sys.exit(1)
          try:
              from modules.clustering_engine import CustomerClusteringEngine
              print('✅ CustomerClusteringEngine OK')
          except Exception as e:
              print(f'❌ CustomerClusteringEngine: {e}')
              sys.exit(1)
          print('🎉 Tüm kritik importlar başarılı!')
          "
